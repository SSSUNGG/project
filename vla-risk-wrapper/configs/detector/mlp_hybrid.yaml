name: mlp_hybrid

# NOTE: vla_hidden_dim must match the policy's hidden state dimension.
# OpenVLA-7B: 4096  (this default)
# Octo-base:  512   <- change this if using Octo in Phase 1/2

input:
  use_vla_hidden: true
  vla_hidden_dim: 4096  # OpenVLA default; set to 512 for Octo
  vla_proj_dim: 256

  use_action_history: true
  action_history_K: 8
  action_dim: 7

  use_proprio: true
  proprio_dim: 8

model:
  hidden_dim: 256
  num_layers: 3
  dropout: 0.1
  norm: layernorm
  activation: gelu

train:
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-2
  batch_size: 256
  epochs: 30
  early_stopping_patience: 5
  loss: weighted_bce
  pos_weight: 4.0
  grad_clip: 1.0

calibration:
  method: temperature_scaling
  val_split_for_calib: 0.5
